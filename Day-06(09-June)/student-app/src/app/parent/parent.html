<div class="parent-container">
  <h2>Parent Component - Counter Demo</h2>

  <div class="button-group">
    <button (click)="increment()" class="btn btn-increment">
      ➕ Increment Counter
    </button>

    <button (click)="decrement()" class="btn btn-decrement">
      ➖ Decrement Counter
    </button>

    <button (click)="toggleChild()" class="btn btn-toggle">
      🔄 Toggle Child Visibility
    </button>
  </div>

  <p class="counter-display">
    Current Counter Value: <strong>{{ counter }}</strong>
  </p>

  @if(showChild) {
    <app-child [counter]="counter"></app-child>
  } @else {
    <p class="child-hidden">Child component is hidden</p>
  }
</div>
